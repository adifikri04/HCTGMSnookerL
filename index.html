<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HC TGM Snooker Club</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#0a0a0a',
            surface: '#171717',
            'surface-container-low': '#1c1c1c',
            'surface-container-high': '#262626',
            primary: '#dc2626',
            'outline-variant': '#404040'
          },
          fontFamily: {
            headline: ['Inter', 'sans-serif'],
            label: ['Inter', 'sans-serif'],
            body: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background-color: #0a0a0a;
      color: white;
    }
    .baize-gradient {
      background: linear-gradient(135deg, #166534 0%, #14532d 100%);
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 bg-neutral-950/80 backdrop-blur-md shadow-2xl shadow-black/50">
    <div class="flex justify-between items-center px-6 md:px-12 py-4 w-full">
      <a href="index.html" class="flex items-center gap-3 group">
        <div class="w-10 h-10 md:w-12 md:h-12 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-900/40 group-hover:scale-105 transition-transform border border-red-500/30">
          <span class="text-white font-black text-xl md:text-2xl font-headline italic">HC</span>
        </div>
        <div class="flex flex-col">
          <span class="text-white font-black tracking-tighter text-sm md:text-lg leading-none font-headline">TGM SNOOKER</span>
          <span class="text-red-600 font-bold tracking-[0.3em] text-[8px] md:text-[10px] leading-none uppercase font-label">Club Elite</span>
        </div>
      </a>
      <div id="nav-links" class="hidden md:flex items-center space-x-8"></div>
    </div>
  </nav>

  <!-- Hero Section -->
  <main class="flex-grow pt-32 pb-24">
    <section class="min-h-[80vh] flex items-center px-6 md:px-12 relative overflow-hidden">
      <!-- Background Elements -->
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-red-900/20 blur-[120px] rounded-full pointer-events-none"></div>
      
      <div class="max-w-[1600px] mx-auto w-full relative z-10 grid lg:grid-cols-2 gap-12 items-center">
        <div>
          <span class="inline-block py-1 px-3 rounded-full bg-red-900/30 border border-red-500/30 text-red-500 text-[10px] font-bold uppercase tracking-widest mb-6">
            The Premier Snooker Destination
          </span>
          <h1 class="text-5xl md:text-7xl lg:text-8xl font-headline font-extrabold -tracking-tighter text-white mb-6 uppercase leading-[0.9]">
            Master <br/> The Baize.
          </h1>
          <p class="text-neutral-400 text-lg md:text-xl max-w-xl mb-12 leading-relaxed">
            Experience championship-grade tables, professional coaching, and elite tournaments at HC TGM Snooker Club.
          </p>
          <div class="flex flex-wrap gap-4">
            <a href="book.html" class="baize-gradient text-white px-8 py-4 rounded-lg font-bold text-sm uppercase tracking-widest hover:brightness-110 transition-all shadow-lg shadow-green-900/20">
              Book a Table
            </a>
            <a href="tournaments.html" class="bg-neutral-900 border border-outline-variant text-white px-8 py-4 rounded-lg font-bold text-sm uppercase tracking-widest hover:bg-neutral-800 transition-all">
              View Tournaments
            </a>
          </div>
        </div>

        <div class="hidden lg:block relative">
          <!-- Stylized Image Placeholder -->
          <div class="w-full aspect-square rounded-2xl bg-surface-container-high border border-outline-variant overflow-hidden relative shadow-2xl">
            <img src="https://images.unsplash.com/photo-1544604555-5fdd884ec81c?auto=format&fit=crop&q=80" alt="Snooker table" class="w-full h-full object-cover opacity-80" />
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="w-full py-12 mt-auto bg-neutral-900 border-t border-neutral-800/30">
    <div class="flex flex-col md:flex-row justify-between items-center px-6 md:px-12 gap-8">
      <div class="text-lg font-bold text-neutral-200 font-headline">HC TGM SNOOKER CLUB</div>
      <p class="text-neutral-500 font-body text-xs opacity-60">
        © 2024 HC TGM SNOOKER CLUB. THE ELITE SNOOKER EXPERIENCE.
      </p>
    </div>
  </footer>

  <script type="module">
    import { initNav } from './nav.js';
    import { initFooter } from './footer.js';
    initNav('home');
    initFooter();
    lucide.createIcons();
  </script>
</body>
</html>
