<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - HC TGM Snooker Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#0a0a0a', surface: '#171717',
            'surface-container-low': '#1c1c1c', 'surface-container-high': '#262626',
            primary: '#dc2626', 'outline-variant': '#404040'
          },
          fontFamily: { headline: ['Inter','sans-serif'], label: ['Inter','sans-serif'], body: ['Inter','sans-serif'] }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background-color: #0a0a0a; color: white; }
    .baize-gradient { background: linear-gradient(135deg, #166534 0%, #14532d 100%); }
    .hidden { display: none !important; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 bg-neutral-950/80 backdrop-blur-md shadow-2xl shadow-black/50">
    <div class="flex justify-between items-center px-6 md:px-12 py-4 w-full">
      <a href="index.html" class="flex items-center gap-3 group">
        <div class="w-10 h-10 md:w-12 md:h-12 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-900/40 group-hover:scale-105 transition-transform border border-red-500/30">
          <span class="text-white font-black text-xl md:text-2xl italic">HC</span>
        </div>
        <div class="flex flex-col">
          <span class="text-white font-black tracking-tighter text-sm md:text-lg leading-none">TGM SNOOKER</span>
          <span class="text-red-600 font-bold tracking-[0.3em] text-[8px] md:text-[10px] leading-none uppercase">Club Elite</span>
        </div>
      </a>
      <div class="hidden md:flex items-center space-x-8">
        <a href="index.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1">Home</a>
        <a href="tournaments.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1">Tournaments</a>
        <a href="players.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1">Players</a>
        <a href="rankings.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1">Rankings</a>
        <!-- Dynamic auth nav -->
        <a id="nav-login" href="login.html" class="uppercase tracking-widest text-xs text-red-600 font-bold border-b-2 border-red-600 pb-1">Login</a>
        <a id="nav-profile" href="profile.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1 hidden">Profile</a>
        <button id="nav-logout" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-red-500 transition-all pb-1 hidden">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="pt-32 pb-24 min-h-screen flex items-center justify-center px-6 w-full">
    <div class="bg-surface-container-high p-8 md:p-12 rounded-xl max-w-md w-full text-center border border-outline-variant/20 shadow-2xl">
      <div class="w-16 h-16 bg-red-600 rounded-xl mx-auto flex items-center justify-center shadow-lg shadow-red-900/40 mb-6 border border-red-500/30">
        <span class="text-white font-black text-3xl italic">HC</span>
      </div>
      <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
      <p class="text-neutral-400 mb-8 text-sm">Sign in to manage your bookings and profile.</p>

      <div id="error-msg" class="hidden bg-red-900/30 border border-red-500/50 text-red-400 p-4 rounded-lg mb-6 text-sm text-left"></div>

      <form id="login-form" class="space-y-4 text-left mb-6">
        <div>
          <label class="block text-xs font-bold text-neutral-400 mb-2 uppercase tracking-widest">Email Address</label>
          <input id="email" required type="email" placeholder="Enter your email"
            class="w-full bg-neutral-900 border border-neutral-800 rounded-lg text-white text-sm focus:ring-1 focus:ring-red-600 focus:border-red-600 p-3 outline-none transition-all" />
        </div>
        <div>
          <label class="block text-xs font-bold text-neutral-400 mb-2 uppercase tracking-widest">Password</label>
          <input id="password" required type="password" placeholder="Your password"
            class="w-full bg-neutral-900 border border-neutral-800 rounded-lg text-white text-sm focus:ring-1 focus:ring-red-600 focus:border-red-600 p-3 outline-none transition-all" />
        </div>
        <button id="btn-login" type="submit"
          class="w-full baize-gradient text-white py-4 rounded-lg text-sm font-bold uppercase tracking-widest hover:brightness-110 transition-all mt-2 disabled:opacity-50">
          Sign In
        </button>
      </form>

      <div class="relative py-3">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-neutral-800"></div></div>
        <div class="relative flex justify-center text-xs">
          <span class="bg-surface-container-high px-2 text-neutral-500 uppercase tracking-widest">Or</span>
        </div>
      </div>

      <div class="space-y-3 mt-4">
        <button id="btn-admin" type="button"
          class="w-full bg-neutral-950 border border-red-900/50 text-red-500 py-4 rounded-lg font-bold uppercase tracking-widest hover:bg-red-900/20 hover:text-red-400 transition-all">
          Admin Login
        </button>
        <p class="text-xs text-neutral-500 pt-2">
          Don't have an account? <a href="signup.html" class="text-red-500 hover:text-red-400 underline">Sign up here</a>.
        </p>
      </div>
    </div>
  </main>

    <footer class="w-full"></footer>

  <script type="module">
    import { initNav } from './nav.js';
    import { initFooter } from './footer.js';
    initNav('login');
    initFooter();

    // --- Login helpers ---
    const errorMsg = document.getElementById('error-msg');
    const btnLogin = document.getElementById('btn-login');
    const btnAdmin = document.getElementById('btn-admin');

    function showError(msg) {
      errorMsg.innerText = msg;
      errorMsg.classList.remove('hidden');
    }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      btn.innerText = loading ? 'Please wait...' : btn.getAttribute('data-label');
    }

    btnLogin.setAttribute('data-label', 'Sign In');
    btnAdmin.setAttribute('data-label', 'Admin Login');

    async function doLogin(asAdmin) {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      errorMsg.classList.add('hidden');

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      const btn = asAdmin ? btnAdmin : btnLogin;
      setLoading(btn, true);

      try {
        const res = await fetch('api/auth.php?action=login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.error) {
          showError(data.error);
        } else {
          if (asAdmin) {
            if (data.role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              showError('You do not have admin privileges.');
            }
          } else {
            window.location.href = data.role === 'admin' ? 'admin.html' : 'profile.html';
          }
        }
      } catch (e) {
        showError('Network error. Please try again.');
      }

      setLoading(btn, false);
    }

    document.getElementById('login-form').addEventListener('submit', (e) => {
      e.preventDefault();
      doLogin(false);
    });

    btnAdmin.addEventListener('click', () => doLogin(true));
    lucide.createIcons();
  </script>
</body>
</html>
