<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop - HC TGM Snooker Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{surface:'#171717','surface-container-low':'#1c1c1c','surface-container-high':'#262626',primary:'#dc2626','outline-variant':'#404040'}}}}</script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body{background:#0a0a0a;color:white;}
    .baize{background:linear-gradient(135deg,#166534,#14532d);}
    .hidden{display:none!important;}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
    .modal-box{background:#1c1c1c;border:1px solid #404040;border-radius:16px;padding:32px;width:100%;max-width:420px;}
  </style>
</head>
<body class="flex flex-col min-h-screen">

<nav class="fixed top-0 w-full z-50 bg-neutral-950/90 backdrop-blur-md border-b border-neutral-900">
  <div class="flex justify-between items-center px-6 md:px-12 py-4 w-full">
    <a href="index.html" class="flex items-center gap-3 group">
      <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center border border-red-500/30 group-hover:scale-105 transition-transform">
        <span class="text-white font-black text-xl italic">HC</span>
      </div>
      <div>
        <div class="text-white font-black tracking-tighter text-sm leading-none">TGM SNOOKER</div>
        <div class="text-red-600 font-bold tracking-widest text-[9px] uppercase">Club Elite</div>
      </div>
    </a>
    <div id="nav-links" class="hidden md:flex items-center gap-6"></div>
  </div>
</nav>

<main class="pt-28 pb-24 px-6 md:px-12 flex-grow">
  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="mb-12">
      <h1 class="text-5xl md:text-6xl font-extrabold text-white tracking-tight uppercase mb-3">Club Shop</h1>
      <p class="text-neutral-500 text-lg">Official HC TGM Snooker Club merchandise. Quality gear for serious players.</p>
    </div>

    <!-- My Orders Toggle -->
    <div class="flex items-center justify-between mb-8">
      <div id="item-count" class="text-sm text-neutral-500"></div>
      <button id="btn-my-orders" class="flex items-center gap-2 bg-neutral-900 border border-neutral-700 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-neutral-800 transition-all hidden">
        <i data-lucide="package" class="w-4 h-4"></i> My Orders
      </button>
    </div>

    <!-- Product Grid -->
    <div id="shop-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      <div class="col-span-full text-center text-neutral-500 py-16">
        <i data-lucide="loader" class="w-8 h-8 mx-auto mb-3 animate-spin"></i>
        Loading items...
      </div>
    </div>

  </div>
</main>

<!-- Buy Modal -->
<div id="buy-modal" class="modal-bg hidden">
  <div class="modal-box">
    <button onclick="document.getElementById('buy-modal').classList.add('hidden')" class="absolute top-4 right-4 text-neutral-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
    <div class="flex items-start gap-4 mb-6">
      <div class="w-16 h-16 bg-neutral-800 rounded-xl flex items-center justify-center flex-shrink-0">
        <i data-lucide="shopping-bag" class="w-7 h-7 text-red-500"></i>
      </div>
      <div>
        <h3 id="modal-name" class="text-xl font-bold text-white"></h3>
        <p id="modal-price" class="text-red-400 font-bold text-lg"></p>
        <p id="modal-stock" class="text-neutral-500 text-sm"></p>
      </div>
    </div>
    <p id="modal-desc" class="text-neutral-400 text-sm mb-6 leading-relaxed"></p>
    <div class="mb-6">
      <label class="block text-xs text-neutral-400 uppercase tracking-widest mb-2">Quantity</label>
      <div class="flex items-center gap-3">
        <button onclick="changeQty(-1)" class="w-10 h-10 bg-neutral-800 rounded-lg text-white font-bold text-xl hover:bg-neutral-700 transition-all">−</button>
        <span id="modal-qty" class="text-2xl font-bold text-white w-10 text-center">1</span>
        <button onclick="changeQty(1)" class="w-10 h-10 bg-neutral-800 rounded-lg text-white font-bold text-xl hover:bg-neutral-700 transition-all">+</button>
        <span class="text-neutral-500 text-sm ml-2">× <span id="modal-unit-price"></span></span>
      </div>
    </div>
    <div class="flex items-center justify-between mb-6 p-4 bg-neutral-900 rounded-xl">
      <span class="text-neutral-400 text-sm uppercase tracking-widest">Total</span>
      <span id="modal-total" class="text-2xl font-extrabold text-white"></span>
    </div>
    <div id="buy-error" class="hidden bg-red-900/30 border border-red-500/50 text-red-400 p-3 rounded-lg mb-4 text-sm"></div>
    <div id="buy-success" class="hidden bg-green-900/30 border border-green-500/50 text-green-400 p-3 rounded-lg mb-4 text-sm"></div>
    <div class="flex gap-3">
      <button onclick="document.getElementById('buy-modal').classList.add('hidden')" class="flex-1 bg-neutral-800 text-white py-3 rounded-xl font-bold text-sm uppercase tracking-widest hover:bg-neutral-700">Cancel</button>
      <button id="btn-confirm-buy" class="flex-1 baize text-white py-3 rounded-xl font-bold text-sm uppercase tracking-widest hover:brightness-110 transition-all">Confirm Order</button>
    </div>
  </div>
</div>

<!-- My Orders Modal -->
<div id="orders-modal" class="modal-bg hidden">
  <div class="modal-box" style="max-width:600px">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-xl font-bold text-white">My Orders</h3>
      <button onclick="document.getElementById('orders-modal').classList.add('hidden')" class="text-neutral-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
    </div>
    <div id="orders-list" class="space-y-3 max-h-96 overflow-y-auto pr-1"></div>
  </div>
</div>

<footer class="w-full py-10 bg-neutral-900 border-t border-neutral-800/30">
  <div class="flex justify-between items-center px-6 md:px-12">
    <div class="text-sm font-bold text-neutral-400">HC TGM SNOOKER CLUB</div>
    <p class="text-neutral-600 text-xs">© 2024 HC TGM SNOOKER CLUB.</p>
  </div>
</footer>

<script type="module">
import { initNav } from './nav.js';
import { initFooter } from './footer.js';
const user = await initNav('shop');
initFooter();
lucide.createIcons();

let currentItem = null;
let qty = 1;

// Load products
const res = await fetch('api/orders.php?action=list');
const items = await res.json();

document.getElementById('item-count').innerText = Array.isArray(items) ? `${items.length} item${items.length !== 1 ? 's' : ''} available` : '';

if (!Array.isArray(items) || items.length === 0) {
  document.getElementById('shop-grid').innerHTML = `<div class="col-span-full text-center text-neutral-500 py-16"><i data-lucide="shopping-bag" class="w-12 h-12 mx-auto mb-4 opacity-30"></i><p>No items in the shop yet. Check back soon!</p></div>`;
} else {
  document.getElementById('shop-grid').innerHTML = items.map(item => `
    <div class="bg-neutral-900 border border-neutral-800 rounded-2xl overflow-hidden flex flex-col group hover:border-red-900/50 transition-all hover:shadow-2xl hover:shadow-red-950/20">
      <div class="h-48 bg-gradient-to-br from-neutral-800 to-neutral-900 flex items-center justify-center relative overflow-hidden">
        ${item.image_url
          ? `<img src="${item.image_url}" alt="${item.name}" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-500"/>`
          : `<i data-lucide="shopping-bag" class="w-16 h-16 text-neutral-700 group-hover:text-red-900 transition-colors"></i>`}
        ${item.stock <= 0 ? `<div class="absolute inset-0 bg-black/70 flex items-center justify-center"><span class="bg-red-900 text-red-300 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">Out of Stock</span></div>` : ''}
      </div>
      <div class="p-5 flex flex-col flex-grow">
        <h3 class="text-lg font-bold text-white mb-1">${item.name}</h3>
        <p class="text-neutral-500 text-sm mb-4 flex-grow leading-relaxed">${item.description || 'Official HC TGM Club item.'}</p>
        <div class="flex items-center justify-between mt-2">
          <div>
            <div class="text-2xl font-extrabold text-white">RM ${parseFloat(item.price).toFixed(2)}</div>
            <div class="text-xs text-neutral-600">${item.stock > 0 ? item.stock + ' in stock' : 'Sold out'}</div>
          </div>
          <button onclick="openBuy(${JSON.stringify(item).replace(/"/g, '&quot;')})"
            ${item.stock <= 0 ? 'disabled' : ''}
            class="baize text-white px-4 py-2 rounded-xl text-sm font-bold uppercase tracking-widest hover:brightness-110 transition-all disabled:opacity-40 disabled:cursor-not-allowed">
            ${item.stock > 0 ? 'Buy' : 'Sold Out'}
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

lucide.createIcons();

// Show My Orders button if logged in
if (user) {
  document.getElementById('btn-my-orders').classList.remove('hidden');
}
document.getElementById('btn-my-orders').addEventListener('click', async () => {
  const r = await fetch('api/orders.php?action=my_orders');
  const myOrders = await r.json();
  const list = document.getElementById('orders-list');
  if (!Array.isArray(myOrders) || myOrders.length === 0) {
    list.innerHTML = '<p class="text-neutral-500 text-center py-8">No orders yet.</p>';
  } else {
    const statusColors = { pending:'text-yellow-400', processing:'text-blue-400', completed:'text-green-400', cancelled:'text-red-400' };
    list.innerHTML = myOrders.map(o => `
      <div class="bg-neutral-900 rounded-xl p-4 flex items-center justify-between gap-4">
        <div>
          <div class="font-bold text-white">${o.merchandise_name}</div>
          <div class="text-xs text-neutral-500 mt-1">${o.created_at?.split(' ')[0]} · Qty: ${o.quantity}</div>
        </div>
        <div class="text-right flex-shrink-0">
          <div class="font-extrabold text-white">RM ${parseFloat(o.total).toFixed(2)}</div>
          <div class="text-xs font-bold uppercase ${statusColors[o.status] || 'text-neutral-400'}">${o.status}</div>
        </div>
      </div>`).join('');
  }
  document.getElementById('orders-modal').classList.remove('hidden');
  lucide.createIcons();
});

// Buy modal
window.openBuy = (item) => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentItem = item;
  qty = 1;
  document.getElementById('modal-name').innerText = item.name;
  document.getElementById('modal-desc').innerText = item.description || '';
  document.getElementById('modal-price').innerText = `RM ${parseFloat(item.price).toFixed(2)}`;
  document.getElementById('modal-stock').innerText = `${item.stock} in stock`;
  document.getElementById('modal-unit-price').innerText = `RM ${parseFloat(item.price).toFixed(2)}`;
  document.getElementById('buy-error').classList.add('hidden');
  document.getElementById('buy-success').classList.add('hidden');
  updateTotal();
  document.getElementById('buy-modal').classList.remove('hidden');
};

window.changeQty = (d) => {
  qty = Math.max(1, Math.min(currentItem?.stock || 1, qty + d));
  document.getElementById('modal-qty').innerText = qty;
  updateTotal();
};

function updateTotal() {
  const total = (parseFloat(currentItem.price) * qty).toFixed(2);
  document.getElementById('modal-total').innerText = `RM ${total}`;
}

document.getElementById('btn-confirm-buy').addEventListener('click', async () => {
  const btn = document.getElementById('btn-confirm-buy');
  const errEl = document.getElementById('buy-error');
  const okEl = document.getElementById('buy-success');
  errEl.classList.add('hidden'); okEl.classList.add('hidden');
  btn.disabled = true; btn.innerText = 'Processing...';

  try {
    const res = await fetch('api/orders.php?action=buy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ merchandise_id: currentItem.id, quantity: qty })
    });
    const data = await res.json();
    if (data.error) {
      errEl.innerText = data.error; errEl.classList.remove('hidden');
    } else {
      okEl.innerText = `Order placed! Total: RM ${parseFloat(data.total).toFixed(2)}. We will contact you shortly.`;
      okEl.classList.remove('hidden');
      setTimeout(() => { document.getElementById('buy-modal').classList.add('hidden'); location.reload(); }, 2500);
    }
  } catch(e) {
    errEl.innerText = 'Network error. Please try again.'; errEl.classList.remove('hidden');
  }

  btn.disabled = false; btn.innerText = 'Confirm Order';
});
</script>
</body>
</html>
