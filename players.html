<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Players - HC TGM Snooker Club</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Config to match your design -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#0a0a0a',
            surface: '#171717',
            'surface-container-low': '#1c1c1c',
            'surface-container-high': '#262626',
            primary: '#dc2626',
            'outline-variant': '#404040'
          },
          fontFamily: {
            headline: ['Inter', 'sans-serif'],
            label: ['Inter', 'sans-serif'],
            body: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      background-color: #0a0a0a;
      color: white;
    }
    .baize-gradient {
      background: linear-gradient(135deg, #166534 0%, #14532d 100%);
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 bg-neutral-950/80 backdrop-blur-md shadow-2xl shadow-black/50">
    <div class="flex justify-between items-center px-6 md:px-12 py-4 w-full">
      <a href="index.html" class="flex items-center gap-3 group">
        <div class="w-10 h-10 md:w-12 md:h-12 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-900/40 group-hover:scale-105 transition-transform border border-red-500/30">
          <span class="text-white font-black text-xl md:text-2xl font-headline italic">HC</span>
        </div>
        <div class="flex flex-col">
          <span class="text-white font-black tracking-tighter text-sm md:text-lg leading-none font-headline">TGM SNOOKER</span>
          <span class="text-red-600 font-bold tracking-[0.3em] text-[8px] md:text-[10px] leading-none uppercase font-label">Club Elite</span>
        </div>
      </a>
      <div id="nav-links" class="hidden md:flex items-center space-x-8"></div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="pt-32 pb-24 px-6 md:px-12 max-w-[1600px] mx-auto flex-grow w-full">
    
    <!-- Header Section -->
    <header class="mb-16">
      <h1 class="font-headline text-5xl md:text-7xl font-extrabold -tracking-tight text-white mb-4 uppercase">
        The Player Gallery
      </h1>
      <p class="text-neutral-500 max-w-2xl text-base md:text-lg leading-relaxed">
        Discover the masters of the baize. From rising stars to seasoned legends, explore the official roster of the HC TGM Snooker Club.
      </p>
    </header>

    <!-- Alphabet Filter -->
    <div class="flex flex-wrap gap-4 mb-16 border-b border-outline-variant/15 pb-8 overflow-x-auto no-scrollbar" id="alphabet-filter">
      <span class="font-label uppercase tracking-widest text-[10px] md:text-xs text-red-600 font-bold px-2 whitespace-nowrap">A — Z Index:</span>
      <!-- Buttons will be injected by JS -->
    </div>

    <!-- Player Profile Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="player-grid">
      <!-- Players will be injected by JS -->
    </div>

  </main>

  <!-- Footer -->
  <footer class="w-full py-12 mt-auto bg-neutral-900 border-t border-neutral-800/30">
    <div class="flex flex-col md:flex-row justify-between items-center px-6 md:px-12 gap-8">
      <div class="text-lg font-bold text-neutral-200 font-headline">HC TGM SNOOKER CLUB</div>
      <p class="text-neutral-500 font-body text-xs opacity-60">
        © 2024 HC TGM SNOOKER CLUB. THE ELITE SNOOKER EXPERIENCE.
      </p>
    </div>
  </footer>

  <script type="module">
    import { initNav } from './nav.js';
    import { initFooter } from './footer.js';
    initNav('players');
    initFooter();

    lucide.createIcons();

    const players = [
      { id: 1, name: 'Ahmed Hassan', rank: 4, level: 'Advanced', tournaments: 14, wins: 5, rate: '35.7%', icon: 'medal' },
      { id: 2, name: 'David Thompson', rank: 3, level: 'Professional', tournaments: 18, wins: 6, rate: '33.3%', icon: 'trophy' },
      { id: 3, name: 'Emily Rodriguez', rank: 5, level: 'Advanced', tournaments: 16, wins: 4, rate: '25%', icon: 'medal' },
      { id: 4, name: 'James O\'Connor', rank: 6, level: 'Advanced', tournaments: 20, wins: 4, rate: '20%', icon: 'medal' },
      { id: 5, name: 'Lisa Zhang', rank: 9, level: 'Intermediate', tournaments: 11, wins: 2, rate: '18.2%', icon: 'medal' },
      { id: 6, name: 'Marcus Chen', rank: 1, level: 'Professional', tournaments: 12, wins: 8, rate: '66.7%', icon: 'trophy' },
    ].sort((a, b) => a.name.localeCompare(b.name));

    const filterContainer = document.getElementById('alphabet-filter');
    const alphabet = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', '...', 'Z'];
    alphabet.forEach(char => {
      const btn = document.createElement('button');
      btn.className = 'font-label text-[10px] md:text-xs uppercase tracking-widest text-white hover:text-red-600 transition-colors';
      btn.innerText = char;
      filterContainer.appendChild(btn);
    });

    const playerGrid = document.getElementById('player-grid');
    players.forEach(player => {
      const card = document.createElement('div');
      card.className = 'bg-surface-container-low p-6 md:p-8 rounded border border-outline-variant/10 flex flex-col group hover:border-red-600/30 transition-all cursor-pointer';
      card.innerHTML = `
        <div class="flex items-center justify-between mb-6">
          <div class="w-12 h-12 bg-neutral-900 rounded-full flex items-center justify-center border border-neutral-800 text-neutral-400 group-hover:text-red-500 transition-colors">
            <i data-lucide="${player.icon}"></i>
          </div>
          <span class="text-xs font-bold text-neutral-500 uppercase tracking-widest">Rank #${player.rank}</span>
        </div>
        <h3 class="text-2xl font-bold text-white mb-2">${player.name}</h3>
        <span class="text-xs font-bold text-red-500 uppercase tracking-widest mb-6">${player.level}</span>
        <div class="grid grid-cols-3 gap-4 mt-auto pt-6 border-t border-outline-variant/10">
          <div><div class="text-xs text-neutral-500 uppercase tracking-widest mb-1">Played</div><div class="text-lg font-bold text-white">${player.tournaments}</div></div>
          <div><div class="text-xs text-neutral-500 uppercase tracking-widest mb-1">Wins</div><div class="text-lg font-bold text-white">${player.wins}</div></div>
          <div><div class="text-xs text-neutral-500 uppercase tracking-widest mb-1">Win %</div><div class="text-lg font-bold text-white">${player.rate}</div></div>
        </div>
      `;
      playerGrid.appendChild(card);
    });
    lucide.createIcons();
  </script>
</body>
</html>
