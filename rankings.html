              <th class="px-6 md:px-8 py-6 font-bold">Rank</th>
              <th class="px-6 md:px-8 py-6 font-bold">Player Name</th>
              <th class="px-6 md:px-8 py-6 font-bold text-center">Tournaments Won</th>

          <tbody id="table-players" class="divide-y divide-white/5">
            <!-- Injected via JS -->

        </table>
      </div>
      <div class="px-6 md:px-8 py-6 bg-surface-container-lowest border-t border-white/5 flex flex-col sm:flex-row justify-between items-center gap-4">

        <div class="flex gap-4">

          <button class="text-neutral-500 hover:text-primary transition-colors"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>

    const podiumGrid = document.getElementById('podium-grid');
    podiumPlayers.forEach(player => {

      const baseClasses = "relative group bg-surface-container-high rounded-md p-6 md:p-8 pt-12 overflow-hidden border-l-2 border-outline-variant/20";
      const highlightClasses = isHighlight ? "bg-gradient-to-b from-primary-container/20 to-surface-container-high border border-primary-container/30 ring-1 ring-primary-container/50 pt-16" : "";
      
      const rankBaseClasses = "absolute top-4 right-4 font-black text-white/5 font-headline";
      const rankHighlightClasses = isHighlight ? "text-9xl -top-4 -right-4 text-primary-container/10 leading-none" : "text-6xl";
      
      const contentClasses = `flex flex-col gap-4 ${isHighlight ? "items-center text-center gap-6" : ""}`;

        `;
      }

      podiumGrid.innerHTML += `
        <div class="${baseClasses} ${highlightClasses}">
          <div class="${rankBaseClasses} ${rankHighlightClasses}">${player.rank}</div>

    tablePlayers.forEach(player => {
