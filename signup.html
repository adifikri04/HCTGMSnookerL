<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - HC TGM Snooker Club</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#0a0a0a', surface: '#171717',
            'surface-container-low': '#1c1c1c', 'surface-container-high': '#262626',
            primary: '#dc2626', 'outline-variant': '#404040'
          },
          fontFamily: { headline: ['Inter','sans-serif'], label: ['Inter','sans-serif'], body: ['Inter','sans-serif'] }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background-color: #0a0a0a; color: white; }
    .baize-gradient { background: linear-gradient(135deg, #166534 0%, #14532d 100%); }
    .hidden { display: none !important; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 bg-neutral-950/80 backdrop-blur-md shadow-2xl shadow-black/50">
    <div class="flex justify-between items-center px-6 md:px-12 py-4 w-full">
      <a href="index.html" class="flex items-center gap-3 group">
        <div class="w-10 h-10 md:w-12 md:h-12 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-900/40 group-hover:scale-105 transition-transform border border-red-500/30">
          <span class="text-white font-black text-xl md:text-2xl italic">HC</span>
        </div>
        <div class="flex flex-col">
          <span class="text-white font-black tracking-tighter text-sm md:text-lg leading-none">TGM SNOOKER</span>
          <span class="text-red-600 font-bold tracking-[0.3em] text-[8px] md:text-[10px] leading-none uppercase">Club Elite</span>
        </div>
      </a>
      <div class="hidden md:flex items-center space-x-8">
        <a href="index.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1">Home</a>
        <a href="tournaments.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1">Tournaments</a>
        <a href="players.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1">Players</a>
        <a href="rankings.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1">Rankings</a>
        <a id="nav-login" href="login.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1 hidden">Login</a>
        <a id="nav-profile" href="profile.html" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-white transition-all pb-1 hidden">Profile</a>
        <button id="nav-logout" class="uppercase tracking-widest text-xs text-neutral-400 hover:text-red-500 transition-all pb-1 hidden">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="pt-32 pb-24 min-h-screen flex items-center justify-center px-6">
    <div class="bg-surface-container-high p-8 md:p-12 rounded-xl max-w-md w-full text-center border border-outline-variant/20 shadow-2xl">
      <div class="w-16 h-16 bg-red-600 rounded-xl mx-auto flex items-center justify-center shadow-lg shadow-red-900/40 mb-6 border border-red-500/30">
        <span class="text-white font-black text-3xl italic">HC</span>
      </div>
      <h2 class="text-3xl font-bold text-white mb-2">Join the Club</h2>
      <p class="text-neutral-400 mb-8 text-sm">Register as a player to book tables and track your rankings.</p>

      <div id="error-msg" class="hidden bg-red-900/30 border border-red-500/50 text-red-400 p-4 rounded-lg mb-6 text-sm text-left"></div>
      <div id="success-msg" class="hidden bg-green-900/30 border border-green-500/50 text-green-400 p-4 rounded-lg mb-6 text-sm text-left"></div>

      <form id="signup-form" class="space-y-4 text-left mb-6">
        <div>
          <label class="block text-xs font-bold text-neutral-400 mb-2 uppercase tracking-widest">Full Name</label>
          <input id="displayName" required type="text" placeholder="Your Name"
            class="w-full bg-neutral-900 border border-neutral-800 rounded-lg text-white text-sm focus:ring-1 focus:ring-red-600 focus:border-red-600 p-3 outline-none transition-all" />
        </div>
        <div>
          <label class="block text-xs font-bold text-neutral-400 mb-2 uppercase tracking-widest">Email Address</label>
          <input id="email" required type="email" placeholder="Enter your email"
            class="w-full bg-neutral-900 border border-neutral-800 rounded-lg text-white text-sm focus:ring-1 focus:ring-red-600 focus:border-red-600 p-3 outline-none transition-all" />
        </div>
        <div>
          <label class="block text-xs font-bold text-neutral-400 mb-2 uppercase tracking-widest">Password</label>
          <input id="password" required minlength="6" type="password" placeholder="Min. 6 characters"
            class="w-full bg-neutral-900 border border-neutral-800 rounded-lg text-white text-sm focus:ring-1 focus:ring-red-600 focus:border-red-600 p-3 outline-none transition-all" />
        </div>
        <button id="btn-signup" type="submit"
          class="w-full baize-gradient text-white py-4 rounded-lg text-sm font-bold uppercase tracking-widest hover:brightness-110 transition-all mt-2 disabled:opacity-50">
          Create Account
        </button>
      </form>

      <p class="text-xs text-neutral-500">
        Already have an account? <a href="login.html" class="text-red-500 hover:text-red-400 underline">Log in here</a>.
      </p>
    </div>
  </main>

    <footer class="w-full"></footer>

  <script type="module">
    import { initNav } from './nav.js';
    import { initFooter } from './footer.js';
    initNav('signup');
    initFooter();

    // --- Signup ---
    const errorMsg  = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const btnSignup = document.getElementById('btn-signup');

    function showError(msg) {
      errorMsg.innerText = msg;
      errorMsg.classList.remove('hidden');
      successMsg.classList.add('hidden');
    }

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');

      const displayName = document.getElementById('displayName').value.trim();
      const email       = document.getElementById('email').value.trim();
      const password    = document.getElementById('password').value;

      if (!displayName || !email || !password) {
        showError('Please fill in all fields.');
        return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      btnSignup.disabled = true;
      btnSignup.innerText = 'Creating account...';

      try {
        const res = await fetch('api/auth.php?action=signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ displayName, email, password })
        });
        const data = await res.json();

        if (data.error) {
          showError(data.error);
        } else {
          successMsg.innerText = 'Account created! Redirecting...';
          successMsg.classList.remove('hidden');
          setTimeout(() => {
            window.location.href = data.role === 'admin' ? 'admin.html' : 'profile.html';
          }, 1000);
        }
      } catch (e) {
        showError('Network error. Please try again.');
      }

      btnSignup.disabled = false;
      btnSignup.innerText = 'Create Account';
    });
    lucide.createIcons();
  </script>
</body>
</html>
